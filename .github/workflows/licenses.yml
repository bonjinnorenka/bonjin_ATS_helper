name: Licenses

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 週次でロックファイル・レジストリ側の表記揺れも拾う
    - cron: "0 6 * * 1"

jobs:
  cargo-deny-licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          command-arguments: licenses
          arguments: --all-features
